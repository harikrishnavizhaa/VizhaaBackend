version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vizhaa
      POSTGRES_PASSWORD: vizhaa123
      POSTGRES_DB: vizhaa_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vizhaa -d vizhaa_db']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://vizhaa:vizhaa123@db:5432/vizhaa_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
